<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Maths Game · Student</title>
<style>
  :root {
    --bg:#fff7ec; --ink:#1d1d24; --muted:#6c6c75;
    --primary:#ff8a3d; --primary-ink:#a84a00;
    --good:#2ebf72; --bad:#e45858;
    --boy-bg:#cfeafd; --boy-ink:#155e8e;
    --girl-bg:#ffd6e6; --girl-ink:#c2185b;
    --shadow:0 6px 0 rgba(0,0,0,0.14);
    --card:#fff;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; min-height:100vh; font-family:'Nunito','Trebuchet MS',sans-serif;
              background:var(--bg); color:var(--ink); }
  .wrap { max-width:760px; margin:0 auto; padding:18px 16px 40px; }
  header.bar { display:flex; justify-content:space-between; align-items:center;
               background:#fff; border:3px solid var(--ink); border-radius:18px;
               padding:10px 14px; box-shadow:var(--shadow); margin-bottom:16px; }
  .title { font-size:20px; font-weight:900; }
  .who { font-weight:800; font-size:13px; }
  .who .name { color:var(--primary-ink); }

  .card { background:var(--card); border:3px solid var(--ink); border-radius:20px;
          padding:22px; box-shadow:var(--shadow); }
  h2.page-title { margin:0 0 14px; font-size:24px; text-align:center; }
  .hidden { display:none !important; }

  /* Gender picker */
  .gender-row { display:flex; gap:14px; }
  .gender-row .gx {
    flex:1; min-height:160px; border:4px solid var(--ink); border-radius:24px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; cursor:pointer; font-size:24px; font-weight:900;
    box-shadow:var(--shadow); transition:transform 0.06s;
  }
  .gender-row .gx:active { transform:translateY(2px); box-shadow:0 4px 0 rgba(0,0,0,0.18); }
  .gender-row .gx.boy  { background:var(--boy-bg);  color:var(--boy-ink); }
  .gender-row .gx.girl { background:var(--girl-bg); color:var(--girl-ink); }
  .gender-row .gx .ico { font-size:60px; }

  /* Names list */
  .names-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:10px; }
  .names-grid .nm {
    border:3px solid var(--ink); background:#fff8e8; border-radius:14px;
    padding:14px 10px; font-weight:900; font-size:18px;
    cursor:pointer; text-align:center; box-shadow:0 4px 0 rgba(0,0,0,0.12);
  }
  .names-grid .nm:active { transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,0.12); }

  /* Confirm dialog */
  .confirm-msg { font-size:22px; font-weight:900; text-align:center; margin:10px 0 18px; }
  .yn-row { display:flex; gap:12px; justify-content:center; }
  .btn { background:var(--primary); color:#fff; border:3px solid var(--ink);
         border-radius:14px; padding:12px 22px; font-size:18px; font-weight:900;
         cursor:pointer; box-shadow:0 4px 0 var(--primary-ink); }
  .btn:active { transform:translateY(2px); box-shadow:0 2px 0 var(--primary-ink); }
  .btn.secondary { background:#fff; color:var(--ink); box-shadow:0 4px 0 rgba(0,0,0,0.25); }
  .btn.good { background:var(--good); box-shadow:0 4px 0 #0e6b37; }
  .btn.bad  { background:var(--bad);  box-shadow:0 4px 0 #8a1e1e; }

  /* Page 2 game tiles */
  .tiles { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:14px; }
  .tile {
    border:4px solid var(--ink); border-radius:20px; padding:18px;
    background:#fff8e8; box-shadow:var(--shadow);
    display:flex; flex-direction:column; gap:8px; align-items:center; text-align:center;
    cursor:pointer; transition:transform 0.06s;
  }
  .tile:active { transform:translateY(2px); box-shadow:0 4px 0 rgba(0,0,0,0.18); }
  .tile.locked { opacity:0.55; cursor:not-allowed; background:#f1ede4; }
  .tile .label { font-size:17px; font-weight:900; }
  .tile .sub { font-size:13px; color:var(--muted); }
  .tile .ico { font-size:42px; }
  .tile .badge { background:var(--primary); color:#fff; border-radius:999px;
                 padding:3px 10px; font-size:11px; font-weight:900; }
  .tile.done .badge { background:var(--good); }
  .lock-msg { font-size:13px; color:var(--bad); font-weight:800; min-height:18px; text-align:center; }

  .empty { color:var(--muted); font-style:italic; padding:6px 0; text-align:center; }
  .switch-link { font-size:13px; color:var(--primary-ink); font-weight:800;
                 background:none; border:none; cursor:pointer; padding:6px 8px; }

  @media (max-width:520px) { .gender-row { flex-direction:column; } }

  /* Ranking table */
  table.rank-tbl { width:100%; border-collapse:collapse; }
  table.rank-tbl th, table.rank-tbl td { border-bottom:2px solid #eee; padding:10px 8px; text-align:left; font-size:14px; }
  table.rank-tbl th { background:#fff3df; font-weight:900; }
  table.rank-tbl tr.top3-red td { background:#ffe1e1; color:#c0392b; font-weight:900; }
  table.rank-tbl tr.me-row td   { outline:3px dashed var(--primary); outline-offset:-3px; }
  .empty-rank { color:var(--muted); font-style:italic; padding:18px 0; text-align:center; }

  /* ---- Multi-device alert modal ---- */
  .modal-shade { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; }
  .modal { background:#fff; border:4px solid var(--ink); border-radius:20px; max-width:420px; width:100%; padding:22px; box-shadow:var(--shadow); text-align:center; }
  .modal h3 { margin:0 0 8px; color:#a84a00; font-size:22px; }
  .modal p  { font-weight:700; line-height:1.4; }

  /* ---- Achievement page ---- */
  .ach-hero { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .ach-avatar {
    width:160px; height:176px; border:4px solid var(--ink); border-radius:24px;
    background:#fff; padding:6px; box-shadow:var(--shadow); cursor:pointer;
  }
  .ach-avatar svg { width:100%; height:100%; display:block; }
  .ach-edit-tip { font-size:12px; font-weight:800; color:var(--primary-ink); }
  .ach-name { font-size:24px; font-weight:900; }
  .ach-section h3 { margin:18px 0 8px; font-size:18px; }
  .play-row { display:flex; flex-wrap:wrap; gap:10px; }
  .play-btn {
    flex:1; min-width:180px;
    border:3px solid var(--ink); border-radius:16px; padding:14px 16px; cursor:pointer;
    background:#fff8e8; font-weight:900; font-size:17px; text-align:left;
    box-shadow:var(--shadow); display:flex; align-items:center; gap:10px;
  }
  .play-btn .ic { font-size:30px; }
  .badge-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:10px; }
  .badge-card {
    border:3px solid var(--ink); border-radius:14px; padding:8px;
    background:#fff; text-align:center; box-shadow:0 4px 0 rgba(0,0,0,0.12);
  }
  .badge-card img { width:88px; height:88px; object-fit:contain; }
  .badge-card .lbl { font-size:11px; font-weight:800; margin-top:4px; line-height:1.2; }

  /* ---- Profile maker (matches the uploaded reference) ---- */
  .pm-app {
    background:#fff; border:3px solid var(--ink); border-radius:24px; overflow:hidden;
    display:flex; flex-direction:column; max-width:520px; margin:0 auto;
    height: min(86vh, 760px);
  }
  .pm-preview-wrap {
    flex: 0 0 45%;
    background:#c9c9c9;
    position:relative;
    overflow:hidden;
  }
  .pm-preview-wrap svg { width:100%; height:100%; display:block; }
  .pm-header {
    position:absolute; top:0; left:0; right:0; padding:10px 14px;
    display:flex; align-items:center; justify-content:space-between; z-index:10;
  }
  .pm-back {
    width:36px; height:36px; background:transparent; border:none;
    font-size:30px; font-weight:700; cursor:pointer; color:#111;
  }
  .pm-actions { display:flex; gap:8px; align-items:center; }
  .pm-random {
    background:#fff; color:#111; border:none; border-radius:999px;
    padding:8px 14px; font-weight:700; font-size:13px; cursor:pointer;
    box-shadow:0 1px 2px rgba(0,0,0,.1);
  }
  .pm-save-btn {
    background:#111; color:#fff; border:none; border-radius:999px;
    padding:9px 22px; font-weight:700; font-size:15px; cursor:pointer;
  }
  .pm-options-pane {
    flex:1; overflow-y:auto; background:#fff;
    padding:14px 8px 8px;
    -webkit-overflow-scrolling:touch;
  }
  .pm-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:8px 4px; }
  .pm-opt {
    aspect-ratio:1/1; border:2.5px solid transparent; border-radius:12px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    position:relative; background:#fff; overflow:hidden;
  }
  .pm-opt svg { width:88%; height:88%; display:block; }
  .pm-opt.selected { border-color:#ffb800; }
  .pm-opt.none-icon::after {
    content:""; position:absolute; inset:22%;
    border-radius:50%; border:3px solid #b9b9b9;
    background: linear-gradient(135deg, transparent 47%, #b9b9b9 47%, #b9b9b9 53%, transparent 53%);
  }
  .pm-palette {
    flex:0 0 56px; background:#2a2d33; display:flex; align-items:center;
    overflow-x:auto; padding:0 12px; gap:14px; scrollbar-width:none;
  }
  .pm-palette::-webkit-scrollbar { display:none; }
  .pm-swatch {
    flex:0 0 34px; width:34px; height:34px; border-radius:50%;
    border:2.5px solid transparent; cursor:pointer;
  }
  .pm-swatch.selected { border-color:#fff; }
  .pm-tabs {
    flex:0 0 64px; background:#1d2025; display:flex; align-items:center;
    overflow-x:auto; scrollbar-width:none; padding:0 6px;
  }
  .pm-tabs::-webkit-scrollbar { display:none; }
  .pm-tab {
    flex:0 0 60px; height:50px; margin:0 2px; border-radius:10px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    color:#9aa0a6; position:relative;
  }
  .pm-tab svg { width:30px; height:30px; }
  .pm-tab.active { background:#33363c; color:#fff; }
</style>
</head>
<body>
<div class="wrap">
  <header class="bar">
    <div class="title">📐 Maths Game</div>
    <div class="who" id="who-strip">
      <button class="switch-link" id="switch-user" hidden>↩︎ Not me</button>
    </div>
  </header>

  <!-- Page 1A: gender -->
  <section id="screen-gender" class="card">
    <h2 class="page-title">Are you a girl or a boy?</h2>
    <div class="gender-row">
      <button class="gx girl" data-v="girl"><span class="ico">👧</span><span>Girl</span></button>
      <button class="gx boy"  data-v="boy"><span class="ico">👦</span><span>Boy</span></button>
    </div>
  </section>

  <!-- Page 1B: name -->
  <section id="screen-name" class="card hidden">
    <h2 class="page-title">Tap your name</h2>
    <div class="names-grid" id="names-grid"></div>
    <p id="names-empty" class="empty hidden">No names yet — ask your teacher to add you in the Teacher panel.</p>
    <div class="yn-row" style="margin-top:18px;">
      <button class="btn secondary" id="back-to-gender">← Back</button>
    </div>
  </section>

  <!-- Page 1C: confirm -->
  <section id="screen-confirm" class="card hidden">
    <p class="confirm-msg" id="confirm-msg">Kia ora! If you're …, click yes.</p>
    <div class="yn-row">
      <button class="btn good" id="confirm-yes">👍 Yes, that's me</button>
      <button class="btn bad"  id="confirm-no">👎 No</button>
    </div>
  </section>

  <!-- Page 2 -->
  <section id="screen-page2" class="card hidden">
    <h2 class="page-title">What would you like to do?</h2>
    <div class="tiles" id="tiles"></div>
    <p class="lock-msg" id="lock-msg"></p>
  </section>

  <!-- Achievement page (shown right after the student confirms their name) -->
  <section id="screen-achievement" class="card hidden">
    <div class="ach-hero">
      <div class="ach-avatar" id="ach-avatar" title="Tap to edit your avatar"></div>
      <div class="ach-edit-tip">👆 tap the picture to edit</div>
      <div class="ach-name" id="ach-name">…</div>
    </div>

    <div class="ach-section">
      <h3>🎮 Let's play</h3>
      <div class="play-row">
        <button class="play-btn" id="play-2dshapes">
          <span class="ic">📐</span><span>2D Shapes</span>
        </button>
      </div>
      <p class="empty" style="font-size:12px;">More buttons coming soon!</p>
    </div>

    <div class="ach-section">
      <h3>🏅 2D Shapes Badges</h3>
      <div class="badge-grid" id="badge-grid"></div>
    </div>
  </section>

  <!-- Profile maker page (mirrors the reference layout) -->
  <section id="screen-profile" class="hidden" style="background:transparent; padding:0; border:none; box-shadow:none;">
    <div class="pm-app">
      <div class="pm-preview-wrap">
        <div class="pm-header">
          <button class="pm-back" id="pm-cancel" aria-label="Back">‹</button>
          <div class="pm-actions">
            <button class="pm-random" id="pm-random" aria-label="Random">🎲 Random</button>
            <button class="pm-save-btn" id="pm-save">Save</button>
          </div>
        </div>
        <svg class="pm-preview-svg" viewBox="0 0 400 400" id="pm-preview"></svg>
      </div>
      <div class="pm-options-pane"><div class="pm-grid" id="pm-grid"></div></div>
      <div class="pm-palette" id="pm-palette"></div>
      <div class="pm-tabs" id="pm-tabs"></div>
    </div>
  </section>

  <!-- Pre-game ranking page -->
  <section id="screen-ranking" class="card hidden">
    <h2 class="page-title" id="rank-title">Ranking</h2>
    <p id="rank-sub" style="text-align:center; color:var(--muted); font-weight:700; margin:-6px 0 14px;">…</p>
    <div id="rank-content"></div>
    <div class="yn-row" style="margin-top:18px; gap:10px; flex-wrap:wrap; justify-content:center;">
      <button class="btn secondary" id="rank-back">🏠 Back to menu</button>
      <button class="btn good"      id="rank-play">▶ Play</button>
      <button class="btn"           id="rank-go-g2">Continue to Game 2 ➜</button>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/tts.js"></script>
<script src="js/avatar.js"></script>
<script>
const $ = (id) => document.getElementById(id);
let state = {
  gender: null,    // 'girl' | 'boy'
  studentId: null,
  studentName: null,
  students: [],
  games: [],
  practiceDone: false,
  game1Done: false,
};

// On returning from a quiz, restore the chosen student
const SESSION_KEY = 'mg.session.v1';
function saveSession(){ try { sessionStorage.setItem(SESSION_KEY, JSON.stringify({ gender:state.gender, id:state.studentId, name:state.studentName })); } catch(e){} }
function loadSession(){ try { return JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null'); } catch(e){ return null; } }
function clearSession(){ try { sessionStorage.removeItem(SESSION_KEY); } catch(e){} }

function showScreen(id) {
  ['screen-gender','screen-name','screen-confirm','screen-page2','screen-ranking',
   'screen-achievement','screen-profile']
    .forEach(s => $(s).classList.add('hidden'));
  $(id).classList.remove('hidden');
  TTS.stop();
}

function updateWhoStrip() {
  const strip = $('who-strip');
  if (state.studentName) {
    strip.innerHTML = `<span class="name">👋 ${escapeHtml(state.studentName)}</span> &nbsp; <button class="switch-link" id="switch-user">↩︎ Not me</button>`;
    document.getElementById('switch-user').onclick = signOut;
  } else {
    strip.innerHTML = '';
  }
}

// ---------- gender pick ----------
document.querySelectorAll('.gx').forEach(b => {
  b.onclick = async () => {
    state.gender = b.dataset.v;
    await renderNames();
    showScreen('screen-name');
  };
});
$('back-to-gender').onclick = () => { state.gender = null; showScreen('screen-gender'); };

async function renderNames() {
  state.students = await DB.listStudents();
  const grid = $('names-grid'); grid.innerHTML = '';
  const filtered = state.students.filter(s => s.gender === state.gender)
                                  .sort((a,b) => a.name.localeCompare(b.name));
  $('names-empty').classList.toggle('hidden', filtered.length > 0);
  for (const s of filtered) {
    const b = document.createElement('button');
    b.className = 'nm';
    b.textContent = s.name;
    b.onclick = () => askConfirm(s);
    grid.appendChild(b);
  }
}

// ---------- confirm ----------
function askConfirm(s) {
  state.studentId = s.id; state.studentName = s.name;
  const msg = `Kia ora! If you're ${s.name}, click yes.`;
  $('confirm-msg').textContent = msg;
  showScreen('screen-confirm');
  // Read it out (en-GB female)
  // Read with a female voice (en-GB preferred, slightly higher pitch for clarity)
  TTS.speak(msg, { gender: 'female', pitch: 1.15, rate: 0.95 });
}
$('confirm-yes').onclick = async () => {
  saveSession();
  if (DB.recordStudentLogin) {
    try { await DB.recordStudentLogin(state.studentId); }
    catch (err) { console.warn('recordStudentLogin failed:', err); }
  }
  startHeartbeat();
  state.practiceDone = await DB.hasCompleted(state.studentId, 'practice');
  state.game1Done    = await DB.hasCompleted(state.studentId, 'game1');
  state.games        = await DB.listGames();
  updateWhoStrip();
  // Land on the Achievement page first (avatar, Let's Play, Badges)
  await renderAchievement();
  showScreen('screen-achievement');
  // Check device count for this student — show alert if > 1
  // (Only counts sessions that have pinged within FRESH_LOGIN_MS, so old/closed
  //  laptops drop out automatically.)
  if (DB.listDeviceCounts) {
    try {
      const counts = await DB.listDeviceCounts();
      const n = counts[state.studentId] || 0;
      if (n > 1) showMultiDeviceAlert(n);
    } catch(e){}
  }
};
$('confirm-no').onclick = () => {
  state.studentId = null; state.studentName = null;
  clearSession();
  showScreen('screen-name');
};

// ---------- page 2 ----------
async function renderPage2() {
  const tiles = $('tiles'); tiles.innerHTML = '';
  $('lock-msg').textContent = '';
  // Practice (always available, points to geometry-quiz.html)
  tiles.appendChild(makeTile({
    label:'Practice', sub:'Warm up your shape brain', ico:'📚',
    badge: state.practiceDone ? 'Done ✓' : 'Start here',
    done: state.practiceDone,
    onClick: openPractice,
  }));
  // Game 1 — once both Practice and Game 1 are done, show ranking page first
  const g1 = state.games.find(g => g.slot === 'game1');
  tiles.appendChild(makeTile({
    label: g1 ? g1.name : 'Yesterday Me vs. Today Me',
    sub: 'Game 1 · Beat your own best score',
    ico:'⚡',
    badge: state.game1Done ? 'Played ✓' : 'Game 1',
    done: state.game1Done,
    locked: !state.practiceDone,
    lockedMsg: 'Finish Practice first to unlock Game 1.',
    onClick: () => {
      if (state.practiceDone && state.game1Done) showRanking('game1', g1);
      else openGame(g1.id);
    },
  }));
  // Game 2 — also show ranking page first (once unlocked)
  const g2 = state.games.find(g => g.slot === 'game2');
  tiles.appendChild(makeTile({
    label: g2 ? g2.name : 'Me vs. the Class',
    sub: 'Game 2 · Compare with your classmates',
    ico:'🏆',
    badge: 'Game 2',
    locked: !state.game1Done,
    lockedMsg: 'Play Game 1 at least once to unlock Game 2.',
    onClick: () => {
      if (state.game1Done) showRanking('game2', g2);
      else openGame(g2.id);
    },
  }));
  // Custom games (teacher-created), all unlocked once Game 1 is done
  for (const g of state.games.filter(g => g.slot === 'custom')) {
    tiles.appendChild(makeTile({
      label: g.name, sub: `${g.duration_minutes} min · custom game`, ico:'🎯',
      badge:'Custom',
      locked: !state.game1Done,
      lockedMsg: 'Play Game 1 first to unlock custom games.',
      onClick: () => {
        if (state.game1Done) showRanking('custom', g);
        else openGame(g.id);
      },
    }));
  }
}
function makeTile({label, sub, ico, badge, done, locked, lockedMsg, onClick}) {
  const el = document.createElement('div');
  el.className = 'tile' + (done?' done':'') + (locked?' locked':'');
  el.innerHTML = `<span class="ico">${ico}</span>
                  <span class="label">${escapeHtml(label)}</span>
                  <span class="sub">${escapeHtml(sub||'')}</span>
                  <span class="badge">${escapeHtml(badge||'')}</span>`;
  el.onclick = () => {
    if (locked) { $('lock-msg').textContent = '🔒 ' + (lockedMsg||'Locked'); return; }
    onClick();
  };
  return el;
}

function openPractice() {
  // Mark as done immediately on open — the practice itself is the existing geometry-quiz
  // page. We treat "opened practice" as completion to keep things simple for kids.
  if (state.studentId) DB.markCompleted(state.studentId, 'practice');
  // Pass the student id so the practice page can record a score when it ends.
  const params = new URLSearchParams({ from: 'student' });
  if (state.studentId) params.set('student', state.studentId);
  window.location.href = 'geometry-quiz.html?' + params.toString();
}
function openGame(gameId) {
  if (!gameId) return;
  // Pass student + game ids to the game page via query string
  const q = new URLSearchParams({ student: state.studentId, game: gameId });
  window.location.href = 'game.html?' + q.toString();
}

// ---------- pre-game ranking screen ----------
async function showRanking(slot, game) {
  $('rank-title').textContent = '🏆 ' + (game.name || (slot==='game1'?'Yesterday Me vs. Today Me':'Me vs. the Class'));
  const content = $('rank-content');
  content.innerHTML = '';

  if (slot === 'game1') {
    // Personal history for this student
    $('rank-sub').textContent = 'Your past scores in this game';
    const myScores = await DB.listScoresFor(state.studentId, game.id);
    const sorted = [...myScores].sort((a,b) => b.score - a.score);
    if (!sorted.length) {
      content.innerHTML = '<p class="empty-rank">You haven\'t played this game yet. Tap Play to start!</p>';
    } else {
      const tbl = document.createElement('table'); tbl.className = 'rank-tbl';
      tbl.innerHTML = '<thead><tr><th>Rank</th><th>When</th><th>Score</th></tr></thead><tbody></tbody>';
      const tb = tbl.querySelector('tbody');
      sorted.slice(0, 12).forEach((s, i) => {
        const tr = document.createElement('tr');
        if (i < 3) tr.classList.add('top3-red');
        tr.innerHTML = `<td>${i+1}</td><td>${formatDate(s.played_at)}</td><td><b>${s.score}</b></td>`;
        tb.appendChild(tr);
      });
      content.appendChild(tbl);
    }
  } else { // game2 or custom — class-wide ranking
    $('rank-sub').textContent = (slot === 'custom')
      ? 'Class ranking for this game — best score per student'
      : 'Class ranking — best score per student';
    const [allScores, students] = await Promise.all([DB.listScores(), DB.listStudents()]);
    const stuById = Object.fromEntries(students.map(s => [s.id, s]));
    const best = {};
    for (const s of allScores.filter(x => x.game_id === game.id)) {
      if (!best[s.student_id] || s.score > best[s.student_id].score) best[s.student_id] = s;
    }
    const ranking = Object.values(best).sort((a,b) => b.score - a.score);
    if (!ranking.length) {
      content.innerHTML = '<p class="empty-rank">No-one has played this game yet. Be first — tap Play!</p>';
    } else {
      const tbl = document.createElement('table'); tbl.className = 'rank-tbl';
      tbl.innerHTML = '<thead><tr><th>Rank</th><th>Student</th><th>Best score</th><th>When</th></tr></thead><tbody></tbody>';
      const tb = tbl.querySelector('tbody');
      ranking.forEach((s, i) => {
        const stu = stuById[s.student_id];
        const tr = document.createElement('tr');
        if (i < 3) tr.classList.add('top3-red');
        if (s.student_id === state.studentId) tr.classList.add('me-row');
        tr.innerHTML = `<td>${i+1}</td><td>${escapeHtml(stu?stu.name:'(unknown)')}</td>
                        <td><b>${s.score}</b></td><td>${formatDate(s.played_at)}</td>`;
        tb.appendChild(tr);
      });
      content.appendChild(tbl);
    }
  }

  // Wire the three buttons
  $('rank-play').onclick = () => openGame(game.id);
  $('rank-back').onclick = () => showScreen('screen-page2');
  const g2 = state.games.find(g => g.slot === 'game2');
  const goG2 = $('rank-go-g2');
  if (slot === 'game2' || !g2) {
    // Already on Game 2's ranking — hide the redundant button
    goG2.classList.add('hidden');
  } else {
    goG2.classList.remove('hidden');
    goG2.onclick = () => openGame(g2.id);
  }

  showScreen('screen-ranking');
}

function formatDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}
async function signOut() {
  // Drop the device-login row so the teacher's "⚠ N devices" badge updates
  const sid = state.studentId;
  stopHeartbeat();
  if (sid && DB.removeStudentLogin) {
    try { await DB.removeStudentLogin(sid); } catch(e){}
  }
  state.studentId = null; state.studentName = null; state.gender = null;
  clearSession(); updateWhoStrip();
  showScreen('screen-gender');
}

// ---------- heartbeat ----------
// While the student is logged in AND the page is visible, refresh the
// device_logins.last_seen_at every minute so the teacher panel knows this
// session is still active. When the laptop is closed or the student walks away,
// the browser pauses these timers — last_seen_at goes stale and the multi-device
// warning automatically clears itself after FRESH_LOGIN_MS (5 min).
let _heartbeat = null;
function startHeartbeat() {
  stopHeartbeat();
  _heartbeat = setInterval(() => {
    if (!state.studentId || !DB.recordStudentLogin) return;
    if (document.hidden) return;  // skip while tab in background
    try { DB.recordStudentLogin(state.studentId); } catch(e){}
  }, 60 * 1000);
}
function stopHeartbeat() {
  if (_heartbeat) { clearInterval(_heartbeat); _heartbeat = null; }
}

// ---------- idle auto-logout ----------
// If the student stops touching the screen for IDLE_MS, log them out so
// the teacher's multi-device badge clears and another student can take over.
const IDLE_MS = 3 * 60 * 1000; // 3 minutes
let _idleTimer = null;
function _resetIdle() {
  if (_idleTimer) clearTimeout(_idleTimer);
  _idleTimer = setTimeout(() => {
    // Only auto-logout if a student is currently signed in
    if (state.studentId) signOut();
  }, IDLE_MS);
}
['click','keydown','touchstart','pointerdown'].forEach(ev =>
  document.addEventListener(ev, _resetIdle, { passive: true }));
_resetIdle();

function escapeHtml(s) { return (s||'').toString().replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

// ---------- Multi-device alert modal ----------
function showMultiDeviceAlert(count) {
  // Don't double-stack if one is already open
  if (document.getElementById('mdev-modal')) return;
  const shade = document.createElement('div');
  shade.className = 'modal-shade';
  shade.id = 'mdev-modal';
  shade.innerHTML = `
    <div class="modal">
      <h3>⚠️ Heads up</h3>
      <p>${count} people are logged in with the same name.<br>Bring it to the teacher.</p>
      <div class="yn-row" style="justify-content:center; margin-top:14px;">
        <button class="btn" id="mdev-dismiss">Dismiss</button>
      </div>
    </div>`;
  document.body.appendChild(shade);
  document.getElementById('mdev-dismiss').onclick = () => shade.remove();
}

// ---------- Achievement page ----------
const BADGE_DEFS = [
  { id:'practice_makes_perfect', label:'Practice Makes Perfect', img:'badge_practice_makes_perfect.png', emoji:'📚' },
  { id:'better_me',              label:'Better Me',              img:'badge_better_me.png',              emoji:'🌱' },
  { id:'even_better_me',         label:'Even Better Me',         img:'badge_even_better_me.png',         emoji:'🚀' },
  { id:'challenge',              label:'Challenge',              img:'badge_challenge.png',              emoji:'⚔️' },
  { id:'warrior',                label:'Warrior',                img:'badge_warrior.png',                emoji:'🥇' },
  { id:'effort',                 label:'Effort',                 img:'badge_effort.png',                 emoji:'💪' },
];
async function renderAchievement() {
  $('ach-name').textContent = state.studentName || '';
  // Avatar — if the student hasn't picked one yet, show no-profile.png; if
  // that file is missing, fall back to the default SVG avatar.
  const profile = (DB.getStudentProfile ? await DB.getStudentProfile(state.studentId) : null);
  const av = $('ach-avatar');
  if (profile) {
    av.style.background = '#fff';
    av.innerHTML = AVATAR.render(profile);
  } else {
    const fallback = AVATAR.render(AVATAR.DEFAULT)
      .replace(/"/g, '&quot;');
    av.style.background = '#1a1a1a';        // matches the dark image so any seam is invisible
    av.innerHTML = `<img src="2d/no-profile.png" alt="No avatar yet"
        style="width:100%; height:100%; display:block; object-fit:cover; border-radius:18px;"
        onerror="this.parentNode.style.background='#fff'; this.parentNode.innerHTML='${fallback}'" />`;
  }
  // Badges
  const grid = $('badge-grid'); grid.innerHTML = '';
  let earned = new Set();
  if (DB.getEarnedBadges) {
    try { earned = await DB.getEarnedBadges(state.studentId); } catch(e){ earned = new Set(); }
  }
  const BADGES_BASE = '2d/badges/2D%20Shapes';
  if (!earned.size) {
    const card = document.createElement('div');
    card.className = 'badge-card';
    card.innerHTML = `<img src="${BADGES_BASE}/no-badge.png" alt="No badges yet"
                       onerror="this.replaceWith(Object.assign(document.createElement('div'),{innerHTML:'🎖',style:'font-size:48px; padding:20px 0;'}))" />
                      <div class="lbl">No badges yet</div>`;
    grid.appendChild(card);
    return;
  }
  for (const def of BADGE_DEFS) {
    if (!earned.has(def.id)) continue;
    const card = document.createElement('div');
    card.className = 'badge-card';
    card.innerHTML = `<img src="${BADGES_BASE}/${def.img}" alt="${escapeHtml(def.label)}"
                       onerror="this.replaceWith(Object.assign(document.createElement('div'),{innerHTML:'${def.emoji}',style:'font-size:48px; padding:20px 0;'}))" />
                      <div class="lbl">${escapeHtml(def.label)}</div>`;
    grid.appendChild(card);
  }
}
$('play-2dshapes').onclick = async () => {
  await renderPage2();
  showScreen('screen-page2');
};
$('ach-avatar').onclick = openProfileMaker;

// ---------- Profile maker (matches uploaded reference) ----------
let _pmProfile = null;
let _pmActiveTab = 'face';
const PM_PART_KEYS = { face:'face', hair:'hair', eyes:'eyes', brows:'brows', mouth:'mouth',
                       nose:'nose', beard:'beard', glass:'glass', hat:'hat', shirt:'shirt' };

async function openProfileMaker() {
  _pmProfile = Object.assign({}, AVATAR.DEFAULT,
    (await (DB.getStudentProfile ? DB.getStudentProfile(state.studentId) : null)) || {});
  _pmActiveTab = 'face';
  pmRenderAll();
  showScreen('screen-profile');
}

function pmRenderAvatar() { $('pm-preview').innerHTML = AVATAR.render(_pmProfile); }
function pmRenderTabs() {
  const tabs = $('pm-tabs'); tabs.innerHTML = '';
  for (const t of AVATAR.TABS) {
    const el = document.createElement('div');
    el.className = 'pm-tab' + (t.id === _pmActiveTab ? ' active' : '');
    el.dataset.id = t.id;
    el.innerHTML = t.icon;
    el.onclick = () => { _pmActiveTab = t.id; pmRenderAll(); };
    tabs.appendChild(el);
  }
}
function pmRenderGrid() {
  const tab = AVATAR.TABS.find(t => t.id === _pmActiveTab);
  const grid = $('pm-grid'); grid.innerHTML = '';
  const partKey = PM_PART_KEYS[tab.id];
  for (const item of tab.items) {
    const isNone = (item.label || '').toLowerCase() === 'none';
    const sel = _pmProfile[partKey] === item.id;
    const cell = document.createElement('div');
    cell.className = 'pm-opt' + (sel ? ' selected' : '') + (isNone ? ' none-icon' : '');
    cell.innerHTML = isNone ? '' : AVATAR.thumb(tab.id, item, _pmProfile);
    cell.onclick = () => { _pmProfile[partKey] = item.id; pmRenderAll(); };
    grid.appendChild(cell);
  }
}
function pmRenderPalette() {
  const tab = AVATAR.TABS.find(t => t.id === _pmActiveTab);
  const pal = $('pm-palette'); pal.innerHTML = '';
  if (!tab.palette) { pal.style.display = 'none'; return; }
  pal.style.display = 'flex';
  // Each palette type maps to its own state key + colour list
  let colors, key;
  if      (tab.palette === 'skin')  { colors = AVATAR.SKIN_TONES;   key = 'skin'; }
  else if (tab.palette === 'hair')  { colors = AVATAR.HAIR_COLORS;  key = 'hairColor'; }
  else if (tab.palette === 'beard') { colors = AVATAR.HAIR_COLORS;  key = 'beardColor'; }
  else if (tab.palette === 'hat')   { colors = AVATAR.SHIRT_COLORS; key = 'hatColor'; }
  else                               { colors = AVATAR.SHIRT_COLORS; key = 'shirtColor'; }
  for (const c of colors) {
    const sw = document.createElement('div');
    sw.className = 'pm-swatch' + (_pmProfile[key] === c ? ' selected' : '');
    sw.style.background = c;
    sw.onclick = () => { _pmProfile[key] = c; pmRenderAll(); };
    pal.appendChild(sw);
  }
}
function pmRenderAll() { pmRenderAvatar(); pmRenderGrid(); pmRenderPalette(); pmRenderTabs(); }

function pmPick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pmPickItemReal(items) { return pmPick(items.filter(i => (i.label || '').toLowerCase() !== 'none')).id; }
$('pm-random').onclick = () => {
  _pmProfile.face  = pmPickItemReal(AVATAR.FACE_SHAPES);
  _pmProfile.hair  = pmPickItemReal(AVATAR.HAIR_STYLES);
  _pmProfile.eyes  = pmPickItemReal(AVATAR.EYES);
  _pmProfile.brows = pmPickItemReal(AVATAR.BROWS);
  _pmProfile.mouth = pmPickItemReal(AVATAR.MOUTHS);
  _pmProfile.nose  = pmPickItemReal(AVATAR.NOSES);
  _pmProfile.shirt = pmPickItemReal(AVATAR.SHIRTS);
  _pmProfile.beard = pmPick(AVATAR.BEARDS).id;
  _pmProfile.glass = pmPick(AVATAR.GLASSES).id;
  _pmProfile.hat   = pmPick(AVATAR.HATS).id;
  _pmProfile.skin       = pmPick(AVATAR.SKIN_TONES);
  _pmProfile.hairColor  = pmPick(AVATAR.HAIR_COLORS);
  _pmProfile.beardColor = pmPick(AVATAR.HAIR_COLORS);
  _pmProfile.hatColor   = pmPick(AVATAR.SHIRT_COLORS);
  _pmProfile.shirtColor = pmPick(AVATAR.SHIRT_COLORS);
  pmRenderAll();
};
$('pm-cancel').onclick = async () => {
  await renderAchievement();
  showScreen('screen-achievement');
};
$('pm-save').onclick = async () => {
  if (DB.setStudentProfile && state.studentId) {
    try { await DB.setStudentProfile(state.studentId, _pmProfile); } catch(e){}
  }
  await renderAchievement();
  showScreen('screen-achievement');
};

// ---------- boot ----------
(async () => {
  TTS.loadVoices(); // warm up voices list
  const sess = loadSession();
  const goParam = new URLSearchParams(location.search).get('go'); // e.g. 'game1' or 'game2'
  if (sess && sess.id) {
    // Try to resume that student
    state.students = await DB.listStudents();
    const found = state.students.find(s => s.id === sess.id);
    if (found) {
      state.gender = found.gender; state.studentId = found.id; state.studentName = found.name;
      // Refresh device-login timestamp + start heartbeat for the resumed session
      if (DB.recordStudentLogin) { try { await DB.recordStudentLogin(found.id); } catch(e){} }
      startHeartbeat();
      state.practiceDone = await DB.hasCompleted(found.id, 'practice');
      state.game1Done    = await DB.hasCompleted(found.id, 'game1');
      state.games        = await DB.listGames();
      updateWhoStrip();
      // ?go=game1 (or game2) → auto-launch that game if it's unlocked
      if (goParam === 'game1' && state.practiceDone) {
        const g1 = state.games.find(g => g.slot === 'game1');
        if (g1) { openGame(g1.id); return; }
      }
      if (goParam === 'game2' && state.game1Done) {
        const g2 = state.games.find(g => g.slot === 'game2');
        if (g2) { openGame(g2.id); return; }
      }
      await renderAchievement();
      showScreen('screen-achievement');
      return;
    }
  }
  showScreen('screen-gender');
})();
</script>
