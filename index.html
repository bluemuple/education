<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phonics Sound Wall</title>
<style>
  :root {
    --c-alphabet: #bcdcf4;
    --c-digraph: #b7ead0;
    --c-rcontrolled: #ffe8ae;
    --c-vowelteam: #f6c9dc;
    --c-diphthong: #ffb98a;
    --c-other: #f3a2a2;
    --c-slot: #e6e6e6;
    --c-slot-border: #9a9a9a;
    --c-ink: #1a1a1a;
    --c-bg: #fafaf7;
    --c-panel: #ffffff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Nunito', 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    background: var(--c-bg);
    color: var(--c-ink);
    min-height: 100vh;
    user-select: none;
  }
  .page { max-width: 1600px; margin: 0 auto; padding: 24px 28px 80px; }
  header.top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px;
    border-bottom: 3px solid var(--c-ink);
    padding-bottom: 12px;
    gap: 16px;
  }
  header.top .title-block h1 { margin: 0; font-size: 34px; font-weight: 900; letter-spacing: -0.5px; }
  header.top .school { font-size: 14px; font-weight: 700; color: #555; text-align: right; line-height: 1.3; }
  header.top .school strong { color: var(--c-ink); display: block; font-size: 16px; }

  .yougotit {
    cursor: pointer;
    transition: transform .15s;
    width: 88px; height: 88px;
    display: block;
    filter: drop-shadow(2px 3px 4px rgba(0,0,0,.15));
    flex-shrink: 0;
  }
  .yougotit:hover { transform: rotate(-6deg) scale(1.08); }
  .yougotit:active { transform: scale(.95); }

  .builder {
    background: var(--c-panel);
    border: 2px solid var(--c-ink);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 4px 4px 0 var(--c-ink);
  }
  .btn-icon {
    background: var(--c-panel);
    border: 2px solid var(--c-ink);
    border-radius: 10px;
    width: 46px; height: 46px;
    font-size: 22px; font-weight: 900;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .08s;
    font-family: inherit;
  }
  .btn-icon:hover { background: #f0f0f0; }
  .btn-icon:active { transform: scale(.94); }

  /* Play buttons (voice) */
  .btn-play {
    width: 68px; height: 68px;
    border: none;
    background: transparent;
    padding: 0;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform .12s;
    filter: drop-shadow(2px 3px 3px rgba(0,0,0,.18));
    border-radius: 50%;
    overflow: hidden;
  }
  .btn-play img {
    width: 100%; height: 100%; display: block; pointer-events: none;
    object-fit: cover;
  }
  .btn-play:hover { transform: scale(1.08) rotate(-3deg); }
  .btn-play:active { transform: scale(.94); }
  .btn-play:disabled { opacity: .45; cursor: not-allowed; filter: grayscale(.6); }
  .btn-voice {
    border: 3px solid var(--c-ink);
    background: #fff;
  }
  #playBtnFemale { border-color: #d93f85; }
  #playBtnMale   { border-color: #2a7fcf; }
  @keyframes wiggle {
    0%,100% { transform: rotate(0); }
    25% { transform: rotate(-8deg) scale(1.05); }
    75% { transform: rotate(8deg) scale(1.05); }
  }
  .btn-play.speaking { animation: wiggle .5s ease-in-out infinite; }

  .slots {
    flex: 1;
    display: flex;
    gap: 6px;
    background: #d9d9d9;
    border: 2px solid var(--c-ink);
    border-radius: 10px;
    padding: 8px;
    min-height: 76px;
  }
  .slot {
    flex: 1;
    min-width: 60px;
    background: var(--c-slot);
    border: 2px dashed var(--c-slot-border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    min-height: 60px;
    transition: background .15s, border-color .15s;
  }
  .slot.drop-hover {
    background: #fff7c9;
    border-color: var(--c-ink);
    border-style: solid;
  }
  .slot.highlight {
    background: #c8f0ff;
    border-color: #2a8ecf;
    border-style: solid;
    transform: scale(1.08);
    transition: all .25s;
  }

  .wall { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  @media (max-width: 1000px) { .wall { grid-template-columns: 1fr; } }

  .panel {
    background: var(--c-panel);
    border: 2px solid var(--c-ink);
    border-radius: 14px;
    padding: 16px;
    box-shadow: 4px 4px 0 var(--c-ink);
  }
  .panel h2 {
    margin: 0 0 14px;
    font-size: 20px; font-weight: 900; letter-spacing: .3px;
    border-bottom: 2px solid var(--c-ink);
    padding-bottom: 8px;
  }

  .group-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .group-label {
    font-weight: 800; font-size: 13px;
    text-align: right; line-height: 1.15; padding-right: 6px;
  }
  .group-label.digraph { color: #169468; }
  .group-label.rcontrolled { color: #c99200; }
  .group-label.vowelteam { color: #c93f85; }
  .group-label.diphthong { color: #d66a14; }
  .group-label.other { color: #c4302b; }

  .tiles-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .alphabet-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }

  .tile {
    width: 62px; height: 62px;
    border: 3px solid var(--c-ink);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 900;
    cursor: pointer;
    touch-action: none;
    transition: transform .1s, box-shadow .1s;
    position: relative;
    line-height: 1;
  }
  .tile:hover {
    transform: translateY(-2px);
    box-shadow: 2px 3px 0 var(--c-ink);
    z-index: 5;
  }
  .tile.dragging {
    cursor: grabbing;
    opacity: .85;
    transform: scale(1.08) rotate(-2deg);
    box-shadow: 4px 6px 0 rgba(0,0,0,.3);
    z-index: 999;
  }
  .slot-tile {
    width: 100%; height: 100%;
    min-height: 60px;
    border: 3px solid var(--c-ink);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 900;
    cursor: pointer;
    transition: transform .15s;
    line-height: 1;
  }
  .slot-tile:hover { transform: scale(1.04); }
  .slot-tile:active { transform: scale(.94); }
  .slot-tile.speaking-now {
    transform: scale(1.25);
    box-shadow: 3px 5px 0 var(--c-ink);
    z-index: 3;
  }

  .tile.alphabet, .slot-tile.alphabet { background: var(--c-alphabet); }
  .tile.digraph, .slot-tile.digraph { background: var(--c-digraph); }
  .tile.rcontrolled, .slot-tile.rcontrolled { background: var(--c-rcontrolled); }
  .tile.vowelteam, .slot-tile.vowelteam { background: var(--c-vowelteam); }
  .tile.diphthong, .slot-tile.diphthong { background: var(--c-diphthong); }
  .tile.other, .slot-tile.other { background: var(--c-other); }

  @keyframes pop-in {
    0%   { transform: scale(.4) rotate(-8deg); opacity: 0; }
    60%  { transform: scale(1.12) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .slot-tile.placed { animation: pop-in .32s ease-out; }
  @keyframes tap-pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.18); box-shadow: 3px 4px 0 var(--c-ink); }
    100% { transform: scale(1); }
  }
  .tile.tap { animation: tap-pulse .22s ease-out; }

  /* Word preview bubble */
  .word-preview {
    display: inline-flex;
    align-items: center;
    background: #fff;
    border: 2px solid var(--c-ink);
    border-radius: 12px;
    padding: 6px 14px;
    font-size: 15px;
    font-weight: 700;
    color: #444;
    min-width: 70px;
    min-height: 44px;
    justify-content: center;
  }
  .word-preview .val { font-size: 22px; font-weight: 900; color: var(--c-ink); font-family: 'Georgia', serif; line-height: 1; }
  .word-preview .val.empty { color: #bbb; font-style: italic; font-weight: 400; font-size: 16px; }

  footer { margin-top: 30px; text-align: center; font-size: 13px; color: #777; }
  footer strong { color: var(--c-ink); }

  .hint { font-size: 12px; color: #888; margin: 4px 0 0; text-align: center; font-style: italic; }
  .voice-notice { font-size: 11px; color: #aaa; text-align: center; margin-top: 4px; }
</style>
</head>

<script>
  // --- data ---
  const digraphs = ['ch','ph','sh','th','wh'];
  const rControlled = ['ar','er','ir','or','ur'];
  const vowelTeams1 = ['ai','au','aw','ay','ea'];
  const vowelTeams2 = ['ee','igh','oa','oo','ow'];
  const diphthongs = ['oi','ou','ow','oy'];
  const other = ['ck','ed','ing','ng','nk'];
  const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');

  // --- audio helpers ---
  const sfxClick = document.getElementById('sfx-click');
  const sfxBack  = document.getElementById('sfx-back');
  const sfxYay   = document.getElementById('sfx-yay');
  function playSfx(el) { try { el.currentTime = 0; el.play().catch(()=>{}); } catch(e) {} }

  // --- British English voice selection (separate female + male) ---
  let gbVoiceFemale = null;
  let gbVoiceMale = null;

  const FEMALE_GB_NAMES = [
    'Kate', 'Serena', 'Fiona', 'Martha', 'Stephanie',
    'Libby', 'Sonia', 'Hazel', 'Susan', 'Mia',
    'Google UK English Female'
  ];
  const MALE_GB_NAMES = [
    'Daniel', 'Oliver', 'Arthur', 'Ryan', 'George',
    'Google UK English Male'
  ];
  const FEMALE_EN_ANY_NAMES = [
    'Samantha', 'Victoria', 'Allison', 'Ava', 'Karen', 'Moira', 'Tessa',
    'Microsoft Zira', 'Microsoft Aria', 'Microsoft Jenny'
  ];
  const MALE_EN_ANY_NAMES = [
    'Alex', 'Fred', 'Tom', 'Aaron',
    'Microsoft David', 'Microsoft Mark', 'Microsoft Guy'
  ];

  function voiceIsFemale(v) {
    if (FEMALE_GB_NAMES.includes(v.name)) return true;
    if (FEMALE_EN_ANY_NAMES.includes(v.name)) return true;
    if (/female|woman|girl/i.test(v.name)) return true;
    return false;
  }
  function voiceIsMale(v) {
    if (MALE_GB_NAMES.includes(v.name)) return true;
    if (MALE_EN_ANY_NAMES.includes(v.name)) return true;
    if (/\bmale\b|\bman\b|\bboy\b/i.test(v.name) && !/female/i.test(v.name)) return true;
    return false;
  }

  function pickGBFemale() {
    const voices = window.speechSynthesis.getVoices();
    if (!voices || !voices.length) return null;
    for (const name of FEMALE_GB_NAMES) {
      const v = voices.find(x => x.name === name && /en[-_]?GB/i.test(x.lang));
      if (v) return v;
    }
    const gbFem = voices.find(v => /en[-_]?GB/i.test(v.lang) && voiceIsFemale(v));
    if (gbFem) return gbFem;
    // Any en-GB voice that isn't explicitly male
    const gbNotMale = voices.find(v => /en[-_]?GB/i.test(v.lang) && !voiceIsMale(v));
    if (gbNotMale) return gbNotMale;
    // Fallback: a known female en-* voice
    for (const name of FEMALE_EN_ANY_NAMES) {
      const v = voices.find(x => x.name === name);
      if (v) return v;
    }
    // Any female-sounding en voice
    const enFem = voices.find(v => /^en/i.test(v.lang) && voiceIsFemale(v));
    if (enFem) return enFem;
    return voices.find(v => /en[-_]?GB/i.test(v.lang)) ||
           voices.find(v => /^en/i.test(v.lang)) || voices[0];
  }

  function pickGBMale() {
    const voices = window.speechSynthesis.getVoices();
    if (!voices || !voices.length) return null;
    for (const name of MALE_GB_NAMES) {
      const v = voices.find(x => x.name === name && /en[-_]?GB/i.test(x.lang));
      if (v) return v;
    }
    const gbMale = voices.find(v => /en[-_]?GB/i.test(v.lang) && voiceIsMale(v));
    if (gbMale) return gbMale;
    // Any en-GB voice that isn't explicitly female
    const gbNotFemale = voices.find(v => /en[-_]?GB/i.test(v.lang) && !voiceIsFemale(v));
    if (gbNotFemale) return gbNotFemale;
    // Fallback: a known male en-* voice
    for (const name of MALE_EN_ANY_NAMES) {
      const v = voices.find(x => x.name === name);
      if (v) return v;
    }
    const enMale = voices.find(v => /^en/i.test(v.lang) && voiceIsMale(v));
    if (enMale) return enMale;
    return voices.find(v => /en[-_]?GB/i.test(v.lang)) ||
           voices.find(v => /^en/i.test(v.lang)) || voices[0];
  }

  function updateVoice() {
    gbVoiceFemale = pickGBFemale();
    gbVoiceMale = pickGBMale();
    const notice = document.getElementById('voiceNotice');
    const bits = [];
    if (gbVoiceFemale) {
      const isGB = /en[-_]?GB/i.test(gbVoiceFemale.lang);
      bits.push(`♀ ${gbVoiceFemale.name} (${gbVoiceFemale.lang})${isGB ? '' : ' ⚠'}`);
    }
    if (gbVoiceMale) {
      const isGB = /en[-_]?GB/i.test(gbVoiceMale.lang);
      bits.push(`♂ ${gbVoiceMale.name} (${gbVoiceMale.lang})${isGB ? '' : ' ⚠'}`);
    }
    if (bits.length) {
      notice.textContent = 'Voices: ' + bits.join(' · ');
      const anyNonGB = (gbVoiceFemale && !/en[-_]?GB/i.test(gbVoiceFemale.lang)) ||
                       (gbVoiceMale && !/en[-_]?GB/i.test(gbVoiceMale.lang));
      notice.style.color = anyNonGB ? '#c4302b' : '#aaa';
    }
  }
  if ('speechSynthesis' in window) {
    updateVoice();
    window.speechSynthesis.onvoiceschanged = updateVoice;
  } else {
    document.getElementById('voiceNotice').textContent = '⚠ Your browser does not support speech synthesis.';
    document.getElementById('voiceNotice').style.color = '#c4302b';
  }

  // --- source tiles (infinite — never consumed) ---
  function makeSourceTile(text, category) {
    const el = document.createElement('div');
    el.className = 'tile ' + category;
    el.textContent = text;
    el.dataset.text = text;
    el.dataset.category = category;
    el.draggable = true;

    el.addEventListener('click', () => {
      if (el.classList.contains('__just-dragged')) { el.classList.remove('__just-dragged'); return; }
      const slot = firstEmptySlot();
      if (!slot) return;
      el.classList.remove('tap'); void el.offsetWidth; el.classList.add('tap');
      addSlotTile(slot, text, category);
      playSfx(sfxClick);
      refreshWordPreview();
    });

    el.addEventListener('dragstart', (e) => {
      el.classList.add('dragging');
      dragPayload = { text, category, fromSlot: null };
      try { e.dataTransfer.setData('text/plain', text); e.dataTransfer.effectAllowed = 'copy'; } catch {}
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      el.classList.add('__just-dragged');
      setTimeout(() => el.classList.remove('__just-dragged'), 50);
      clearDropHover();
    });

    // Touch
    let touchStartedInside = false, moved = false, sx=0, sy=0;
    el.addEventListener('touchstart', (e) => {
      touchStartedInside = true; moved = false;
      const t = e.touches[0]; sx = t.clientX; sy = t.clientY;
      dragPayload = { text, category, fromSlot: null };
    }, {passive: true});
    el.addEventListener('touchmove', (e) => {
      if (!touchStartedInside) return;
      const t = e.touches[0];
      const dx = t.clientX - sx, dy = t.clientY - sy;
      if (Math.abs(dx) + Math.abs(dy) > 6) moved = true;
      if (moved) {
        el.classList.add('dragging');
        el.style.transform = `translate(${dx}px,${dy}px) scale(1.08) rotate(-2deg)`;
        el.style.zIndex = 999;
        el.style.pointerEvents = 'none';
        const below = document.elementFromPoint(t.clientX, t.clientY);
        el.style.pointerEvents = '';
        clearDropHover();
        if (below && below.classList.contains('slot')) below.classList.add('drop-hover');
        e.preventDefault();
      }
    }, {passive: false});
    el.addEventListener('touchend', (e) => {
      if (!touchStartedInside) return;
      touchStartedInside = false;
      el.style.transform = ''; el.style.zIndex = ''; el.classList.remove('dragging');
      if (!moved) {
        const slot = firstEmptySlot();
        if (slot) {
          el.classList.remove('tap'); void el.offsetWidth; el.classList.add('tap');
          addSlotTile(slot, text, category);
          playSfx(sfxClick);
          refreshWordPreview();
        }
      } else {
        const t = e.changedTouches[0];
        const below = document.elementFromPoint(t.clientX, t.clientY);
        if (below && below.classList.contains('slot')) {
          addSlotTile(below, text, category);
          playSfx(sfxClick);
          refreshWordPreview();
        }
      }
      clearDropHover();
    });

    return el;
  }

  function fillRow(id, items, category) {
    const row = document.getElementById(id);
    items.forEach(t => row.appendChild(makeSourceTile(t, category)));
  }
  fillRow('row-digraphs', digraphs, 'digraph');
  fillRow('row-rcontrolled', rControlled, 'rcontrolled');
  fillRow('row-vowelteams1', vowelTeams1, 'vowelteam');
  fillRow('row-vowelteams2', vowelTeams2, 'vowelteam');
  fillRow('row-diphthongs', diphthongs, 'diphthong');
  fillRow('row-other', other, 'other');
  alphabet.forEach(l => document.getElementById('alphabetGrid').appendChild(makeSourceTile(l, 'alphabet')));

  // --- slot state ---
  let dragPayload = null;

  function firstEmptySlot() { return document.querySelector('.slot:not(:has(.slot-tile))'); }
  function clearDropHover() { document.querySelectorAll('.slot.drop-hover').forEach(s => s.classList.remove('drop-hover')); }

  function addSlotTile(slot, text, category) {
    const existing = slot.querySelector('.slot-tile');
    if (existing) slot.removeChild(existing);
    const st = document.createElement('div');
    st.className = 'slot-tile placed ' + category;
    st.textContent = text;
    st.dataset.text = text;
    st.dataset.category = category;
    st.addEventListener('click', () => {
      slot.removeChild(st);
      playSfx(sfxBack);
      refreshWordPreview();
    });
    st.draggable = true;
    st.addEventListener('dragstart', (e) => {
      dragPayload = { text, category, fromSlot: slot };
      try { e.dataTransfer.setData('text/plain', text); e.dataTransfer.effectAllowed = 'move'; } catch {}
    });
    slot.appendChild(st);
    setTimeout(() => st.classList.remove('placed'), 400);
  }

  function setupSlot(slot) {
    slot.addEventListener('dragover', (e) => { e.preventDefault(); slot.classList.add('drop-hover'); });
    slot.addEventListener('dragleave', () => slot.classList.remove('drop-hover'));
    slot.addEventListener('drop', (e) => {
      e.preventDefault();
      slot.classList.remove('drop-hover');
      if (!dragPayload) return;
      const fromSlot = dragPayload.fromSlot;
      if (fromSlot && fromSlot !== slot) {
        const tile = fromSlot.querySelector('.slot-tile');
        if (tile) fromSlot.removeChild(tile);
      } else if (fromSlot === slot) {
        dragPayload = null; return;
      }
      addSlotTile(slot, dragPayload.text, dragPayload.category);
      playSfx(sfxClick);
      dragPayload = null;
      refreshWordPreview();
    });
  }
  document.querySelectorAll('.slot').forEach(setupSlot);

  document.body.addEventListener('dragover', (e) => { if (dragPayload && dragPayload.fromSlot) e.preventDefault(); });
  document.body.addEventListener('drop', (e) => {
    if (!dragPayload || !dragPayload.fromSlot) return;
    const target = e.target;
    if (target && target.closest && target.closest('.slot')) return;
    const fromSlot = dragPayload.fromSlot;
    const tile = fromSlot.querySelector('.slot-tile');
    if (tile) { fromSlot.removeChild(tile); playSfx(sfxBack); refreshWordPreview(); }
    dragPayload = null;
  });

  // --- buttons ---
  document.getElementById('resetBtn').addEventListener('click', () => {
    const hadAny = document.querySelector('.slot .slot-tile');
    document.querySelectorAll('.slot .slot-tile').forEach(t => t.parentElement.removeChild(t));
    if (hadAny) playSfx(sfxBack);
    refreshWordPreview();
  });

  document.getElementById('addSlotBtn').addEventListener('click', () => {
    const slots = document.getElementById('slots');
    const newSlot = document.createElement('div');
    newSlot.className = 'slot';
    newSlot.dataset.slot = slots.children.length;
    slots.appendChild(newSlot);
    setupSlot(newSlot);
  });

  document.getElementById('yougotit').addEventListener('click', () => {
    playSfx(sfxYay);
    const img = document.getElementById('yougotit');
    img.style.transform = 'rotate(12deg) scale(1.2)';
    setTimeout(() => img.style.transform = '', 300);
  });

  // --- word preview + play ---
  function getCurrentWord() {
    const tiles = document.querySelectorAll('#slots .slot .slot-tile');
    const parts = [];
    tiles.forEach(t => parts.push(t.dataset.text));
    return parts.join('');
  }
  function getPlacedTilesInOrder() {
    return Array.from(document.querySelectorAll('#slots .slot')).map(slot => slot.querySelector('.slot-tile')).filter(Boolean);
  }

  function refreshWordPreview() {
    const word = getCurrentWord();
    const val = document.getElementById('wordVal');
    const btnF = document.getElementById('playBtnFemale');
    const btnM = document.getElementById('playBtnMale');
    if (word.length) {
      val.textContent = word;
      val.classList.remove('empty');
      btnF.disabled = false;
      btnM.disabled = false;
    } else {
      val.textContent = '—';
      val.classList.add('empty');
      btnF.disabled = true;
      btnM.disabled = true;
    }
  }

  document.getElementById('playBtnFemale').addEventListener('click', () => {
    const word = getCurrentWord();
    if (!word) return;
    speakWord(word, gbVoiceFemale, 'playBtnFemale', 1.1);
  });
  document.getElementById('playBtnMale').addEventListener('click', () => {
    const word = getCurrentWord();
    if (!word) return;
    speakWord(word, gbVoiceMale, 'playBtnMale', 0.9);
  });

  function speakWord(word, voice, btnId, pitch) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const btn = document.getElementById(btnId);
    const placed = getPlacedTilesInOrder();

    // Highlight each tile briefly as the word begins
    placed.forEach((t, i) => {
      setTimeout(() => {
        t.classList.add('speaking-now');
        setTimeout(() => t.classList.remove('speaking-now'), 240);
      }, i * 120);
    });

    const totalLead = placed.length * 120 + 60;
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(word);
      u.lang = 'en-GB';
      if (voice) u.voice = voice;
      u.rate = 0.85;
      u.pitch = pitch;
      u.onstart = () => btn.classList.add('speaking');
      u.onend = () => btn.classList.remove('speaking');
      u.onerror = () => btn.classList.remove('speaking');
      window.speechSynthesis.speak(u);
    }, totalLead);
  }

  refreshWordPreview();
</script>
</body>
</html>
